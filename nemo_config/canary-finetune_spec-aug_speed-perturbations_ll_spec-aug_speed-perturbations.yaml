defaults:
  - model: canary
  - trainer: canary
  - exp_manager: base_finetune
  - optim@model.optim: adamw
  - preprocessor@model.preprocessor: base
  - spec_augment@model.spec_augment: base
  - train_ds@model.train_ds: train_ds_canary_lillelyd
  - validation_ds@model.validation_ds: lhotse_validation_dataset

name: 'canary-finetune_spec-aug_speed-perturbations_LL_spec-aug_speed-perturbations'

seed: 15

# use `init_from_nemo_model` or `init_from_pretrained_model` to initialize the model
# We do not currently support `init_from_ptl_ckpt` to create a single script for all types of models.
init_from_nemo_model: artifact://canary-finetune_spec-aug_speed-perturbations_27154105:latest/canary-finetune_spec-aug_speed-perturbations.nemo # path to nemo model
trainer:
  log_every_n_steps: 5
  val_check_interval: 25
  max_steps: 10000
  limit_train_batches: ${trainer.max_steps}

model:
  optim:
    lr: 5e-6

exp_manager:
  create_early_stopping_callback: true
  early_stopping_callback_params:
    monitor: 'coralval_wer'
    mode: 'min'
    patience: 3
    min_epochs: 1
  checkpoint_callback_params:
    save_top_k: 1
    save_nemo_on_train_end: true
    save_best_model: true
    min_epochs: ${exp_manager.early_stopping_callback_params.min_epochs}
