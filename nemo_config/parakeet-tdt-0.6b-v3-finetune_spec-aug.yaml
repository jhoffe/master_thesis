defaults:
  - model: parakeet-tdt-0.6b-v3
  - trainer: parakeet-tdt-0.6b-v3
  - exp_manager: base_single
  - optim@model.optim: adamw
  - preprocessor@model.preprocessor: base
  - spec_augment@model.spec_augment: base
  - train_ds@model.train_ds: train_ds_parakeet
  - validation_ds@model.validation_ds: base_validation_dataset
  - test_ds@model.test_ds: base_test_dataset

name: 'parakeet-tdt-0.6b-v3-finetune_spec-aug'

seed: 15

# use `init_from_nemo_model` or `init_from_pretrained_model` to initialize the model
# We do not currently support `init_from_ptl_ckpt` to create a single script for all types of models.
init_from_pretrained_model: nvidia/parakeet-tdt-0.6b-v3 # path to nemo model
