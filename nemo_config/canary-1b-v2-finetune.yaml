name: 'canary-1b-v2-finetune'

# use `init_from_nemo_model` or `init_from_pretrained_model` to initialize the model
# We do not currently support `init_from_ptl_ckpt` to create a single script for all types of models.
init_from_pretrained_model: nvidia/canary-1b-v2 # path to nemo model

model:
  sample_rate: 16000
  log_prediction: false

  train_ds:
    manifest_filepath: '${oc.env:NEMO_CORAL_DATASET_PROCESSED_PATH}/CoRal-project_coral-v2_read-aloud/train/sharded_manifests/manifest__OP_0..295_CL_.json'
    sample_rate: ${model.sample_rate}
    batch_size: 16 # you may increase batch_size if your memory allows
    shuffle: true
    num_workers: 6
    pin_memory: true
    max_duration: 20
    min_duration: 0.1
    # tarred datasets
    is_tarred: true
    tarred_audio_filepaths: '${oc.env:NEMO_CORAL_DATASET_PROCESSED_PATH}/CoRal-project_coral-v2_read-aloud/train/audio__OP_0..295_CL_.tar'
    shuffle_n: 2048
    # bucketing params
    bucketing_strategy: 'fully_randomized'
    bucketing_batch_size: null
    use_lhotse: true
    batch_duration: 1100
    quadratic_duration: 30
    num_buckets: 30
    num_cuts_for_bins_estimate: 10000
    bucket_buffer_size: 10000
    shuffle_buffer_size: 10000
    text_field: 'text'
    lang_field: 'target_lang'

  # validation_ds:
  #   manifest_filepath: '${oc.env:NEMO_CORAL_DATASET_PATH}/CoRal-project/coral-v2/read_aloud/val/lhotse_val_CoRal-project_coral-v2_manifest.jsonl'
  #   sample_rate: ${model.sample_rate}
  #   batch_size: 16
  #   shuffle: false
  #   use_start_end_token: false
  #   num_workers: 6
  #   pin_memory: true
  #   use_lhotse: true
  #   text_field: 'text'
  #   lang_field: 'target_lang'
  #   is_tarred: false
  #   bucketing_strategy: null
  #   batch_duration: null
  #   quadratic_duration: null
  #   num_buckets: 0
  #   infinite: false
  #   tarred_audio_filepaths: null
  #   force_map_dataset: true
  #   force_finite: true

  # test_ds:
  #   manifest_filepath: '${oc.env:NEMO_CORAL_DATASET_PATH}/CoRal-project/coral-v2/read_aloud/test/lhotse_test_CoRal-project_coral-v2_manifest.jsonl'
  #   sample_rate: ${model.sample_rate}
  #   batch_size: 16
  #   shuffle: false
  #   use_start_end_token: false
  #   num_workers: 6
  #   pin_memory: true
  #   use_lhotse: true
  #   bucketing_strategy: null
  #   batch_duration: null
  #   quadratic_duration: null
  #   num_buckets: 0
  #   infinite: false
  #   text_field: 'text'
  #   lang_field: 'target_lang'
  #   tarred_audio_filepaths: null
  #   force_map_dataset: true
  #   force_finite: true

  char_labels: # use for char based models
    update_labels: false
    labels: null # example list config: \[' ', 'a', 'b', 'c'\]

  tokenizer: # use for spe/bpe based tokenizer models
    update_tokenizer: false
    dir: null # path to directory which contains either tokenizer.model (bpe) or vocab.txt (for wpe)
    type: bpe # Can be either bpe (SentencePiece tokenizer) or wpe (WordPiece tokenizer)

  preprocessor:
    _target_: nemo.collections.asr.modules.AudioToMelSpectrogramPreprocessor
    sample_rate: ${model.sample_rate}
    normalize: 'per_feature'
    window_size: 0.025
    window_stride: 0.01
    window: 'hann'
    features: 128
    n_fft: 512
    log: true
    frame_splicing: 1
    dither: 0.00001
    pad_to: 0
    pad_value: 0.0

  spec_augment:
    _target_: nemo.collections.asr.modules.SpectrogramAugmentation
    freq_masks: 2 # set to zero to disable it
    time_masks: 10 # set to zero to disable it
    freq_width: 27
    time_width: 0.05

  optim:
    name: adamw
    lr: 1e-4
    # optimizer arguments
    betas: [0.9, 0.98]
    weight_decay: 1e-3

    # scheduler setup
    sched:
      name: CosineAnnealing
      # scheduler config override
      warmup_steps: 5000
      warmup_ratio: null
      min_lr: 5e-6

trainer:
  devices: -1 # number of GPUs, -1 would use all available GPUs
  num_nodes: 1
  max_epochs: 10
  max_steps: 100000 # computed at runtime if not set
  accelerator: auto
  strategy: 'auto'
  accumulate_grad_batches: 1
  gradient_clip_val: 0.0
  precision: bf16-mixed # 16, 32, or bf16
  log_every_n_steps: 100 # Interval of logging.
  enable_progress_bar: True
  num_sanity_val_steps: 2 # number of steps to perform validation steps for sanity check the validation process before starting the training, setting to 0 disables it
  sync_batchnorm: true
  enable_checkpointing: False # Provided by exp_manager
  logger: false # Provided by exp_manager
  benchmark: false # needs to be false for models with variable-length speech input as it slows down training
  limit_train_batches: 15625
  use_distributed_sampler: false

exp_manager:
  exp_dir: null
  name: ${name}
  create_tensorboard_logger: false
  create_checkpoint_callback: true
  checkpoint_callback_params:
    save_on_train_epoch_end: true
  resume_if_exists: false
  resume_ignore_no_checkpoint: false

  create_wandb_logger: true
  wandb_logger_kwargs:
    name: ${name}_${oc.env:LSB_JOBID}
    project: ${oc.env:WANDB_PROJECT}
