defaults:
  - model: parakeet
  - trainer: parakeet
  - exp_manager: base_single
  - optim@model.optim: adamw
  - preprocessor@model.preprocessor: base
  - spec_augment@model.spec_augment: disabled
  - train_ds@model.train_ds: train_ds_parakeet_lillelyd
  - validation_ds@model.validation_ds: base_validation_dataset
  - test_ds@model.test_ds: base_test_dataset

name: 'parakeet-finetune_spec-aug_LL'

seed: 15

# use `init_from_nemo_model` or `init_from_pretrained_model` to initialize the model
# We do not currently support `init_from_ptl_ckpt` to create a single script for all types of models.
init_from_nemo_model: artifact://parakeet-finetune_spec-aug_27154169:latest/parakeet-finetune_spec-aug.nemo # path to nemo model
trainer:
  log_every_n_steps: 5
  val_check_interval: 1.0

model:
  optim:
    lr: 5e-6

exp_manager:
  create_early_stopping_callback: true
  early_stopping_callback_params:
    monitor: 'val_wer'
    mode: 'min'
    patience: 3
    min_epochs: 18
  checkpoint_callback_params:
    save_top_k: 1
    save_nemo_on_train_end: false
    save_best_model: true
    min_epochs: ${exp_manager.early_stopping_callback_params.min_epochs}
